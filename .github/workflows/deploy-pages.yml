name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # El sitio ya viene compilado (build estático de Vite). Copiamos solo los
      # archivos públicos a _site para no publicar .git ni metadatos del repo.
      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html favicon.svg _site/
          cp -r assets _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          # Habilita Pages (build_type=workflow) con el GITHUB_TOKEN del workflow,
          # así no hace falta activarlo manualmente en Settings → Pages.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
